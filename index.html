<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#0f172a">
  <title>Задачи выхода на строительную площадку</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="app-shell">
    <header class="topbar clean-home-header">
      <div class="clean-title-block">
        <h1>Задачи выхода на строительную площадку</h1>
        <p id="projectLine" class="muted project-subtitle"></p>
      </div>
    </header>

    <main>
      <section id="loginPanel" class="card login-card clean-login-card">
        <h2>Вход</h2>
        <label>Сотрудник</label>
        <select id="userSelect"></select>
        <label>Код</label>
        <input id="pinInput" type="password" placeholder="Введите код">
        <button id="loginBtn" class="primary">Войти</button>
        <div id="loginError" class="error hidden"></div>
      </section>

      <section id="workspace" class="hidden">
        <div class="toolbar card">
          <div class="control-group">
            <label>День</label>
            <select id="daySelect"></select>
          </div>
          <div id="employeeFilterWrap" class="control-group hidden">
            <label>Сотрудник</label>
            <select id="employeeFilter"></select>
          </div>
          <button id="logoutBtn">Выйти</button>
        </div>

        <section class="stats-grid">
          <div class="stat card"><span id="totalTasks">0</span><small>задач</small></div>
          <div class="stat card"><span id="doneTasks">0</span><small>выполнено</small></div>
          <div class="stat card"><span id="leftTasks">0</span><small>осталось</small></div>
        </section>

        <section id="tasksPanel" class="card"></section>
        <section id="summaryPanel" class="card"></section>
        <section class="user-footer card">
          <div class="eyebrow">Пользователь</div>
          <div id="currentUser" class="strong"></div>
        </section>
      </section>
    </main>
  </div>

  <script src="js/tasks-data.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
